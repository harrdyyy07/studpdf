<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Year (P & C Cycle) | vtuwise</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="manifest" href="../manifest.json">
</head>

<body>
    <nav id="navbar"></nav>

    <main class="container" style="padding-top: 8rem;">
        <div class="breadcrumb">
            <a href="../index.html">🏠</a>
            <span class="breadcrumb-separator">/</span>
            <span>First Year</span>
        </div>

        <header style="margin-bottom: 4rem;">
            <div class="badge"
                style="color: var(--primary); background: rgba(99, 102, 241, 0.1); width: fit-content; margin-bottom: 1rem;">
                Common Stream</div>
            <h1 style="font-size: 3.5rem; margin-bottom: 1.5rem;">First Year (P & C Cycle)</h1>
            <p style="color: var(--text-muted); font-size: 1.1rem; max-width: 600px;">Select your current semester
                (Cycle) to access all common engineering subjects.</p>
        </header>

        <div id="sem-grid" class="branch-grid"></div>
    </main>

    <script src="../data.js"></script>
    <script src="../auth.js"></script>
    <script src="../nav.js"></script>
    <script src="../search.js"></script>
    <script>
        const deptData = siteData['firstyear'];
        const grid = document.getElementById('sem-grid');

        deptData.schemes.forEach(scheme => {
            // Create a section header for the scheme
            const schemeHeader = document.createElement('div');
            schemeHeader.style.gridColumn = '1 / -1';
            schemeHeader.style.marginTop = '2rem';
            schemeHeader.innerHTML = `<h2 style="font-size: 2rem; border-bottom: 2px solid var(--surface-border); padding-bottom: 0.5rem; margin-bottom: 1.5rem;">${scheme.name}</h2>`;
            grid.appendChild(schemeHeader);

            // Iterate over the cycles in this scheme
            scheme.cycles.forEach(cycle => {
                const card = document.createElement('a');
                card.href = `${scheme.slug}/${cycle.slug}/`;
                card.className = 'branch-card glass';
                card.style.padding = '3rem';

                // Determine icon based on cycle
                const isPhysics = cycle.name.toLowerCase().includes('physics');
                const icon = isPhysics ? '⚛️' : '🧪';

                card.innerHTML = `
                    <div style="display: flex; align-items: center; gap: 2rem;">
                        <span style="font-size: 4rem; opacity: 0.9;">${icon}</span>
                        <div>
                            <h3 style="margin-bottom: 0.5rem;">${cycle.name}</h3>
                            <p style="font-size: 0.9rem;">View Subjects →</p>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        });
    </script>
</body>

</html>
