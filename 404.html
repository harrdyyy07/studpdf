<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found | vtuwise</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .error-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            text-align: center;
            padding: 2rem;
        }

        .error-code {
            font-size: clamp(6rem, 20vw, 12rem);
            font-weight: 800;
            line-height: 1;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        .error-page h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .error-page p {
            font-size: 1.1rem;
            color: var(--text-muted);
            max-width: 500px;
            margin: 0 auto 2.5rem;
        }

        .error-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-home {
            background: var(--primary);
            color: white !important;
            padding: 0.8rem 2rem;
            border-radius: 0.75rem;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(43, 89, 255, 0.3);
        }

        .btn-home:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(43, 89, 255, 0.4);
            background: var(--primary-hover);
        }
    </style>
    <link rel="manifest" href="../manifest.json">
</head>

<body>
    <nav id="navbar"></nav>

    <main class="container error-page">
        <div class="error-code">404</div>
        <h1>Lost in the curriculum?</h1>
        <p>The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.
        </p>
        <div class="error-actions">
            <a href="index.html" class="btn-home">Return Home</a>
            <button onclick="document.querySelector('.nav-search-btn').click();" class="btn-download-slider"
                style="color: var(--text); border-color: var(--surface-border);">Search Notes</button>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 vtuwise. Built for Engineers.</p>
        </div>
    </footer>

    <script src="data.js"></script>
    <script src="auth.js"></script>
    <script src="nav.js"></script>
    <script src="search.js"></script>
</body>

</html>
